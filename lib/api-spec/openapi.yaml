openapi: 3.1.0
info:
  title: Api
  version: 1.0.0
  description: Lawcaspro Legal Operations System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: platform
    description: Founder platform management
  - name: users
    description: User management
  - name: roles
    description: Role and permission management
  - name: developers
    description: Developer management
  - name: projects
    description: Project management
  - name: clients
    description: Client management
  - name: cases
    description: Case management
  - name: dashboard
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Platform / Founder ──────────────────────────────────────────────────
  /platform/firms:
    get:
      operationId: listFirms
      tags: [platform]
      summary: List all firms
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of firms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirmListResponse"
    post:
      operationId: createFirm
      tags: [platform]
      summary: Create a new firm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFirmBody"
      responses:
        "201":
          description: Created firm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"

  /platform/firms/{firmId}:
    get:
      operationId: getFirm
      tags: [platform]
      summary: Get a firm
      parameters:
        - name: firmId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Firm detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateFirm
      tags: [platform]
      summary: Update a firm
      parameters:
        - name: firmId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFirmBody"
      responses:
        "200":
          description: Updated firm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firm"

  /platform/stats:
    get:
      operationId: getPlatformStats
      tags: [platform]
      summary: Get platform-level statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  # ── Quotations ──────────────────────────────────────────────────────────
  /quotations:
    get:
      operationId: listQuotations
      tags: [quotations]
      summary: List quotations
      responses:
        "200":
          description: List of quotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuotationSummary"
    post:
      operationId: createQuotation
      tags: [quotations]
      summary: Create a quotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuotationBody"
      responses:
        "201":
          description: Created quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationDetail"

  /quotations/{id}:
    get:
      operationId: getQuotation
      tags: [quotations]
      summary: Get quotation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quotation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationDetail"
    patch:
      operationId: updateQuotation
      tags: [quotations]
      summary: Update a quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuotationBody"
      responses:
        "200":
          description: Updated quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationDetail"
    delete:
      operationId: deleteQuotation
      tags: [quotations]
      summary: Delete a quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /quotations/{id}/duplicate:
    post:
      operationId: duplicateQuotation
      tags: [quotations]
      summary: Duplicate a quotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Duplicated quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotationDetail"

  # ── Dashboard ───────────────────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get firm dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # ── Users ───────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users in the firm
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: roleId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Roles ───────────────────────────────────────────────────────────────
  /roles:
    get:
      operationId: listRoles
      tags: [roles]
      summary: List roles in the firm
      responses:
        "200":
          description: List of roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
    post:
      operationId: createRole
      tags: [roles]
      summary: Create a role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleBody"
      responses:
        "201":
          description: Created role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"

  /roles/{roleId}:
    get:
      operationId: getRole
      tags: [roles]
      summary: Get a role
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
    patch:
      operationId: updateRole
      tags: [roles]
      summary: Update a role
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleBody"
      responses:
        "200":
          description: Updated role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
    delete:
      operationId: deleteRole
      tags: [roles]
      summary: Delete a role
      parameters:
        - name: roleId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /roles/bootstrap:
    post:
      operationId: bootstrapRoles
      tags: [roles]
      summary: Bootstrap standard roles for the firm
      responses:
        "200":
          description: Bootstrapped successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ── Developers ──────────────────────────────────────────────────────────
  /developers:
    get:
      operationId: listDevelopers
      tags: [developers]
      summary: List developers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of developers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperListResponse"
    post:
      operationId: createDeveloper
      tags: [developers]
      summary: Create a developer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeveloperBody"
      responses:
        "201":
          description: Created developer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Developer"

  /developers/{developerId}:
    get:
      operationId: getDeveloper
      tags: [developers]
      summary: Get a developer
      parameters:
        - name: developerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Developer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Developer"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDeveloper
      tags: [developers]
      summary: Update a developer
      parameters:
        - name: developerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeveloperBody"
      responses:
        "200":
          description: Updated developer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Developer"
    delete:
      operationId: deleteDeveloper
      tags: [developers]
      summary: Delete a developer
      parameters:
        - name: developerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Projects ─────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List projects
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: developerId
          in: query
          schema:
            type: integer
        - name: projectType
          in: query
          schema:
            type: string
        - name: titleType
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: ["updatedAt", "createdAt", "referenceNo", "spaDate"]
        - name: sortDir
          in: query
          schema:
            type: string
            enum: ["asc", "desc"]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Clients ──────────────────────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{clientId}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientBody"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Cases ─────────────────────────────────────────────────────────────────
  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List cases
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: "Keyword search across reference, client/purchaser, project, and property"
        - name: status
          in: query
          schema:
            type: string
        - name: projectId
          in: query
          schema:
            type: integer
        - name: developerId
          in: query
          schema:
            type: integer
        - name: assignedLawyerId
          in: query
          schema:
            type: integer
        - name: assignedClerkId
          in: query
          schema:
            type: integer
        - name: assignedToUserId
          in: query
          schema:
            type: integer
        - name: spaStatus
          in: query
          schema:
            type: string
        - name: loanStatus
          in: query
          schema:
            type: string
        - name: milestone
          in: query
          schema:
            $ref: "#/components/schemas/CaseMilestoneKey"
        - name: milestonePresence
          in: query
          schema:
            $ref: "#/components/schemas/MilestonePresence"
        - name: overdueDays
          in: query
          schema:
            type: integer
            enum: [7, 14, 30]
        - name: purchaseMode
          in: query
          schema:
            type: string
        - name: titleType
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseListResponse"
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseBody"
      responses:
        "201":
          description: Created case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseDetail"

  /cases/{caseId}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get a case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCase
      tags: [cases]
      summary: Update a case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseBody"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseDetail"

  /cases/{caseId}/workflow:
    get:
      operationId: getCaseWorkflow
      tags: [cases]
      summary: Get case workflow steps
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow steps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowStep"

  /cases/{caseId}/workflow/{stepId}:
    patch:
      operationId: updateWorkflowStep
      tags: [cases]
      summary: Update a workflow step
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkflowStepBody"
      responses:
        "200":
          description: Updated step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowStep"

  /cases/{caseId}/notes:
    get:
      operationId: getCaseNotes
      tags: [cases]
      summary: Get case notes
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseNote"
    post:
      operationId: createCaseNote
      tags: [cases]
      summary: Add a note to a case
      parameters:
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseNoteBody"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseNote"

  /cases/stats/by-status:
    get:
      operationId: getCaseStatsByStatus
      tags: [cases]
      summary: Get case counts grouped by status
      responses:
        "200":
          description: Case status breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseStatusCount"

  /cases/stats/by-type:
    get:
      operationId: getCaseStatsByType
      tags: [cases]
      summary: Get case counts grouped by purchase mode
      responses:
        "200":
          description: Case type breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseTypeCount"

  /cases/recent:
    get:
      operationId: getRecentCases
      tags: [cases]
      summary: Get recently updated cases
      parameters:
