kind = "mobile"
previewPath = "/mobile/"
title = "Lawcaspro Mobile"
version = "1.0.0"
id = "artifacts/lawcaspro-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20245

[services.development]
run = "pnpm --filter @workspace/lawcaspro-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lawcaspro-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lawcaspro-mobile", "run", "serve" ]

[services.env]
PORT = "20245"
BASE_PATH = "/mobile/"
