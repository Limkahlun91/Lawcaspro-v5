kind = "web"
previewPath = "/"
title = "Lawcaspro"
version = "1.0.0"
id = "artifacts/lawcaspro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26131

[services.development]
run = "pnpm --filter @workspace/lawcaspro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lawcaspro", "run", "build" ]
publicDir = "artifacts/lawcaspro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26131"
BASE_PATH = "/"
